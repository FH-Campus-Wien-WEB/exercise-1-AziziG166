<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body {
            background-color: #2c2a2a;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #111;
            margin-bottom: 50px;
        }

        article {
            background-color: #111;
            color: #fff;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 25px;
            padding: 30px;
            margin-bottom: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        article img {
            width: 220px;
            height: auto;
            border-radius: 20px;
            object-fit: contain;
            background-color: #222;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            align-self: flex-start;
        }

        .movie-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        p {
            margin: 5px 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ccc;
        }

        .genre {
            background-color: #333;
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-right: 8px;
            display: inline-block;
            text-transform: uppercase;
            font-weight: bold;
        }

        .stats {
            margin-top: auto;
            padding-top: 15px;
            display: flex;
            gap: 20px;
            font-weight: bold;
            color: #fff;
        }
    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body */ 
                    const movies = JSON.parse(xhr.responseText);

                    movies.forEach(movie => {
                        const movieArticle = document.createElement("article");

                        movieArticle.innerHTML = `
                            <img src="${movie.Poster}" alt="${movie.Title}">
                            <div class="movie-info">
                                <h2>${movie.Title}</h2>
                                <p>Released: <time datetime="${movie.Released}">${movie.Released}</time></p>
                                <p>Runtime: ${movie.Runtime} min</p>
                                <p>Genres: ${movie.Genres.map(g => `<span class="genre">${g}</span>`).join("")}</p>
                                <p>Directors: ${movie.Directors.join(", ")}</p>
                                <p>Writers: ${movie.Writers.join(", ")}</p>
                                <p>Actors: ${movie.Actors.join(", ")}</p>
                                <p>Plot: ${movie.Plot}</p>
                                <p>Metascore: ${movie.Metascore}</p>
                                <p>IMDb Rating: ${movie.imdbRating}/10</p>
                            </div>
                        `;

                        bodyElement.appendChild(movieArticle);
                    });
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
